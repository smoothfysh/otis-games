<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ABC Animal Stickers — Otis Games</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="styles/game.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🐊</text></svg>">
</head>
<body>
  <div class="ab-wrapper" id="app">
    <div class="game-header">
      <a href="../index.html" class="ab-back-link" onclick="OtisAudio.playPop()">← Back</a>
    </div>

    <div class="ab-view ab-home active" id="viewHome">
      <div class="ab-logo">🐊📖</div>
      <div class="ab-title">ABC Animal Stickers</div>
      <div class="ab-subtitle">Learn the alphabet with animals!</div>
      <div class="ab-home-buttons">
        <button class="ab-home-btn game-btn" onclick="startGame()">
          <span class="ab-btn-icon">🎯</span>
          Start Game
        </button>
        <button class="ab-home-btn book-btn" onclick="showView('book')">
          <span class="ab-btn-icon">📖</span>
          Sticker Book
        </button>
      </div>
    </div>

    <div class="ab-view ab-book" id="viewBook">
      <div class="ab-book-header">
        <button class="ab-book-back" onclick="showView('home')">
          <span class="arrow">←</span> Back
        </button>
        <h2>📖 Sticker Book</h2>
      </div>
      <div class="ab-book-grid" id="bookGrid"></div>
    </div>

    <div class="ab-modal" id="modal">
      <div class="ab-modal-inner">
        <button class="ab-modal-close" onclick="closeModal()">✕</button>
        <div class="ab-modal-letter" id="modalLetter">A</div>
        <div style="position:relative;display:flex;align-items:center;width:100%;justify-content:center;">
          <button class="ab-modal-nav prev" onclick="navAnimal(-1)">‹</button>
          <div class="ab-modal-sticker" id="modalSticker">🐊</div>
          <button class="ab-modal-nav next" onclick="navAnimal(1)">›</button>
        </div>
        <div class="ab-modal-name" id="modalName">Alligator</div>
        <div class="ab-modal-counter" id="modalCounter">1 / 5</div>
        <div class="ab-modal-facts" id="modalFacts"></div>
        <button class="ab-modal-listen" id="modalListen">🔊 Listen</button>
      </div>
    </div>

    <div class="ab-view ab-game" id="viewGame">
      <div class="ab-game-header">
        <button class="ab-game-back" onclick="quitGame()"><span class="arrow">←</span> Quit</button>
        <span class="ab-game-round" id="gameRound">1 / 26</span>
      </div>
      <div class="ab-game-prompt">
        <div class="ab-game-letter" id="gameLetter">A</div>
        <div class="ab-game-arrow">▼</div>
      </div>
      <div class="ab-game-choices" id="gameChoices"></div>
      <div class="ab-game-message" id="gameMessage"></div>
    </div>

    <div class="game-footer"><span>© Otis Games by Cadence-X.com</span></div>
  </div>

  <script src="../scripts/shared.js"></script>
  <script src="js/facts.js"></script>
  <script src="js/animals.js"></script>
  <script src="js/state.js"></script>
  <script src="js/book.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
